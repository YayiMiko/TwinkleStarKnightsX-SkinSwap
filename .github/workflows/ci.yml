name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  tools:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: android/package-lock.json
      - name: Run Python tests
        run: python -m unittest discover -s tests -v
      - name: Build Android runtime
        working-directory: android
        run: |
          npm ci
          npm run build
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -File -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $failed = $true
              $errors | Write-Error
            }
          }
          if ($failed) { exit 1 }
      - name: Test update rollback
        shell: powershell
        run: .\tests\Test-UpdateTransaction.ps1
      - name: Test precompiled plugin packaging
        shell: powershell
        run: .\tests\Test-PrecompiledPlugin.ps1
      - name: Test uninstall ownership
        shell: powershell
        run: .\tests\Test-UninstallOwnership.ps1
      - name: Test Android device authorization
        shell: powershell
        run: .\tests\Test-AndroidDeviceAuthorization.ps1
